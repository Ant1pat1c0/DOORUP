<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DOORUP PRO</title>
  <style>
    body {
      margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #121212; color: #fff; font-family: 'Segoe UI', sans-serif;
    }
    .spinner {
      width: 34px; height: 34px; border: 3px solid #333; border-top-color: #1db954;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div style="text-align:center;">
    <div class="spinner"></div>
    <p>Abriendo DOORUP PRO...</p>
  </div>

  <script>
    // ⚠️ REEMPLAZA esta URL por la de TU implementación de Apps Script
    // (Implementar → Administrar implementaciones → copiar la URL que termina en /exec)
    var URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbzCWv1vwJRhrWIXknFhYaAMpyHlzBRLLFUwdQCPfuJaX85Np87YK5Txi-5Se4iZYGtK/exec";

    // Esto es lo importante: reenvía TODO lo que venga en la URL (por ejemplo
    // ?playlist=abc123) hacia Apps Script — si esto faltara, el link de
    // WhatsApp abriría el sitio pero sin la playlist compartida cargada.
    window.location.replace(URL_APPS_SCRIPT + window.location.search);
  </script>
</body>
</html>
