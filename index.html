<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOORUP PRO</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: #121212; color: #fff;
      font-family: 'Segoe UI', sans-serif;
    }
    #loader {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1; background: #121212; transition: opacity 0.3s ease;
    }
    .spinner {
      width: 38px; height: 38px; border: 3px solid #282828; border-top-color: #1db954;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #888; font-size: 0.9rem; margin: 0; }
    iframe {
      width: 100%; height: 100%; border: none;
      position: absolute; top: 0; left: 0; z-index: 2;
    }
  </style>
</head>
<body>

  <!-- Pantalla de carga estética mientras carga Apps Script -->
  <div id="loader">
    <div class="spinner"></div>
    <p>Abriendo DOORUP PRO...</p>
  </div>

  <!-- El contenedor de la app -->
  <iframe id="app-frame" allow="autoplay"></iframe>

  <script>
    // Tu URL base de Apps Script
    var URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbzbYGPP2GCNhJwZpICEyDJ0ND2_QZScVuKj1PfmWGo8ILPv14YZ13iGEpPBL7-ZAw/exec";

    // Captura los parámetros que vienen en la barra de direcciones (?playlist=xyz, etc.)
    var queryParams = window.location.search;

    // Asigna la URL completa con parámetros al src del iframe
    var iframe = document.getElementById("app-frame");
    iframe.src = URL_APPS_SCRIPT + queryParams;

    // Oculta el loader cuando el iframe termine de cargar
    iframe.onload = function() {
      var loader = document.getElementById("loader");
      if (loader) {
        loader.style.opacity = "0";
        setTimeout(function() { loader.style.display = "none"; }, 300);
      }
    };
  </script>
</body>
</html>
